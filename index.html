<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SPMB SMKN 1 WAY TENONG</title>
    <!-- Trik memutus cache browser agar desain biru langsung muncul -->
    <link rel="stylesheet" href="style.css?v=1.1">
</head>
<body>

    <div class="container">
        <div class="card">
            
            <!-- Logo Sekolah -->
            <img src="logo.png" alt="Logo SMKN 1 Way Tenong" class="logo">

            <!-- Judul Utama -->
            <h2>PENGUMUMAN SISTEM PENERIMAAN MURID BARU</h2>
            <h2>(SPMB)</h2>
            <h3>SMKN 1 WAY TENONG</h3>
            <p class="ta">Tahun Ajaran 2026/2027</p>
            
            <div class="underline"></div>

            <!-- Teks Petunjuk Input -->
            <p class="instruction">Masukkan Nomor Peserta / NISN resmi Anda untuk verifikasi kelulusan seleksi:</p>

            <!-- Input Kode -->
            <input type="text" id="nisnInput" placeholder="Contoh: 0086613170" maxlength="10">

            <!-- Tombol Cek -->
            <button onclick="cekKelulusan()">CEK HASIL SELEKSI</button>

            <!-- Tempat Menampilkan Hasil (Kartu Hijau / Merah) -->
            <div id="result-container"></div>
            
            <!-- Pesan Error Bawaan -->
            <p id="errorMsg" class="error hidden">Data tidak ditemukan, periksa kembali nomor Anda.</p>
            
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
